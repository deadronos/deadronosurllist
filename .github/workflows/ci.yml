name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          USE_MOCK_DB: true

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    env:
      USE_MOCK_DB: true
      USE_MOCK_AUTH: true
      SKIP_ENV_VALIDATION: true
      PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      NEXTAUTH_SECRET: ci-auth-static-credential-value # gitleaks:allow
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-auth-static-credential-value # gitleaks:allow
      HELLO: world
      AUTH_DISCORD_ID: "123456789012345678" # gitleaks:allow
      AUTH_DISCORD_SECRET: ci-auth-static-credential-value # gitleaks:allow
      AUTH_GOOGLE_ID: ci-auth-static-credential-value # gitleaks:allow
      AUTH_GOOGLE_SECRET: ci-auth-static-credential-value # gitleaks:allow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build application
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test
        env:
          # Force diagnostic mode for the auth-flow spec by overriding IDs to placeholders
          AUTH_DISCORD_ID: "placeholder"
          AUTH_GOOGLE_ID: "placeholder"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
